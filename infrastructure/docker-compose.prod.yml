# ─────────────────────────────────────────────────────────────────────────────
# Orion IDE — Production Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# - No exposed ports except 80/443 on nginx reverse proxy
# - restart: unless-stopped on all services
# - Health checks on all services
# - Resource limits (memory, cpu)
# ─────────────────────────────────────────────────────────────────────────────

version: '3.8'

services:
  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: orion-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - orion-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orion-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - orion-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── API Gateway ─────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    container_name: orion-api-gateway
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      - redis
    networks:
      - orion-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M


  # ── Auth Service ────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: orion-auth-service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      - redis
    networks:
      - orion-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Drive Service ───────────────────────────────────────────────────────
  drive-service:
    build:
      context: ../services/drive-service
      dockerfile: Dockerfile
    container_name: orion-drive-service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3002
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      - redis
    networks:
      - orion-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Editor Service ──────────────────────────────────────────────────────
  editor-service:
    build:
      context: ../services/editor-service
      dockerfile: Dockerfile
    container_name: orion-editor-service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3003
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      - redis
    networks:
      - orion-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Execution Service ──────────────────────────────────────────────────
  execution-service:
    build:
      context: ../services/execution-service
      dockerfile: Dockerfile
    container_name: orion-execution-service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3004
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - orion-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Agent Service ──────────────────────────────────────────────────────
  agent-service:
    build:
      context: ../services/agent-service
      dockerfile: Dockerfile
    container_name: orion-agent-service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3005
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      - redis
    networks:
      - orion-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── Notification Service ───────────────────────────────────────────────
  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile
    container_name: orion-notification-service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3006
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3006/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      - redis
    networks:
      - orion-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: orion-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - orion-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ── Piston (Code Execution Sandbox) ─────────────────────────────────────
  piston:
    image: ghcr.io/engineer-man/piston
    container_name: orion-piston
    restart: unless-stopped
    tmpfs:
      - /piston/jobs:exec,size=256m
    environment:
      - OUTPUT_MAX_SIZE=65536
      - MAX_PROCESS_COUNT=64
      - RUN_TIMEOUT=15000
    volumes:
      - piston-packages:/piston/packages
    networks:
      - orion-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  orion-network:
    name: orion-network
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  redis-data:
    name: orion-redis-data
  piston-packages:
    name: orion-piston-packages
